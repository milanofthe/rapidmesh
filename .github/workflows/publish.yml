name: publish

# Build the abi3 wheels (and sdist) for the rapidmesh Python package and
# publish them to PyPI on a version tag. The maturin project lives in python/
# and depends on the workspace crates via path; the full repo is checked out so
# those path deps resolve.
#
# PyPI auth uses Trusted Publishing (OIDC) -- configure a publisher on PyPI for
# this repo + workflow (https://docs.pypi.org/trusted-publishers/); a "pending
# publisher" works for the first release. No API token secret is needed.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheels ${{ matrix.platform.target }} (${{ matrix.platform.os }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: ubuntu-latest, target: x86_64 }
          - { os: windows-latest, target: x64 }
          - { os: macos-latest, target: aarch64 }
          # Intel-mac wheel cross-compiled on the arm64 runner: GitHub's Intel
          # macOS (macos-13) runners are scarce/deprecated and queue forever.
          - { os: macos-latest, target: x86_64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --manifest-path python/Cargo.toml
          manylinux: auto
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [wheels, sdist]
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write # Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
