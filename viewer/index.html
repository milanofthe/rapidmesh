<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>rapidmesh viewer</title>
		<style>
			:root {
				--bg: #14171c;
				--panel-bg: #1b1f26;
				--border: #2a3038;
				--text: #d8dde6;
				--text-dim: #8a93a3;
				--accent: #e8a33d;
			}
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				background: var(--bg);
				color: var(--text);
				font: 13px/1.4 'Segoe UI', system-ui, sans-serif;
				height: 100vh;
				display: flex;
				flex-direction: column;
			}
			#app {
				display: flex;
				flex-direction: column;
				height: 100%;
			}
			header {
				display: flex;
				align-items: center;
				gap: 14px;
				padding: 8px 14px;
				border-bottom: 1px solid var(--border);
				flex-wrap: wrap;
			}
			.brand {
				font-weight: 600;
				color: var(--accent);
				margin-right: 8px;
			}
			header label {
				display: flex;
				align-items: center;
				gap: 5px;
				color: var(--text-dim);
			}
			header select,
			header input[type='range'] {
				background: var(--panel-bg);
				color: var(--text);
				border: 1px solid var(--border);
				border-radius: 4px;
				padding: 2px 6px;
			}
			.hint {
				margin-left: auto;
				color: var(--text-dim);
			}
			#panels {
				flex: 1;
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
				gap: 10px;
				padding: 10px;
				min-height: 0;
			}
			.panel {
				display: flex;
				flex-direction: column;
				background: var(--panel-bg);
				border: 1px solid var(--border);
				border-radius: 6px;
				overflow: hidden;
				min-height: 0;
			}
			.panel-title {
				display: flex;
				align-items: baseline;
				gap: 10px;
				padding: 6px 10px;
				border-bottom: 1px solid var(--border);
			}
			.panel-title b {
				color: var(--accent);
			}
			.panel-title span {
				color: var(--text-dim);
				font-size: 12px;
			}
			.panel canvas {
				flex: 1;
				width: 100%;
				min-height: 0;
				display: block;
			}
		</style>
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
